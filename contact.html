<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Dr. Jean Dupont</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#1E3A5F;
    --secondary:#2E5C8A;
    --accent:#E67E22;
    --light-bg:#F4F6F8;
    --text-dark:#2C3E50;
    --white:#FFFFFF;
}
body {font-family:'Open Sans',sans-serif;background:var(--light-bg);margin:0;color:var(--text-dark);}
header {background:var(--primary);color:white;padding:20px 10%;}
.section {padding:60px 10%;}
form {background:white;padding:30px;border-radius:6px;box-shadow:0 4px 10px rgba(0,0,0,0.05);}
input, textarea {width:100%;padding:10px;margin-bottom:15px;border:1px solid #ccc;border-radius:4px;}
button {background:var(--accent);color:white;border:none;padding:12px 20px;border-radius:4px;cursor:pointer;}
button:hover {background:#cf6d17;}
footer {background:var(--primary);color:white;text-align:center;padding:20px;margin-top:40px;}
</style>
</head>

<body>

<header>
<h1>Contact</h1>
</header>

<section class="section">

<form>
<input type="text" placeholder="Votre nom" required>
<input type="email" placeholder="Votre email" required>
<textarea rows="5" placeholder="Votre message"></textarea>
<button type="submit">Envoyer</button>
</form>

<p style="margin-top:30px;">
Email : jean.dupont@universite.fr<br>
Laboratoire XYZ — Université ABC
</p>

</section>

<footer>
© 2026 Dr. Jean Dupont
</footer>

</body>
</html>
